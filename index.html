<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOL System Loading...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #0a1f2f 0%, #000811 70%);
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: transparent;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        .logo {
            font-size: 4.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffcc;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .loading-bar {
            width: 400px;
            height: 18px;
            background: #112233;
            border: 2px solid #00ffcc;
            margin: 0 auto 30px;
            position: relative;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #00ccaa);
            box-shadow: 0 0 15px #00ffcc;
            transition: width 5s linear;
        }

        .status {
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 204, 0.15) 50%
            );
            background-size: 100% 4px;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <div class="logo">SOL</div>
        <div class="subtitle">SYSTEM 42 // ARCHIVE TRANSITION</div>
        
        <div class="loading-bar">
            <div class="progress" id="progress"></div>
            <div class="scanline"></div>
        </div>
        
        <div class="status" id="status">Connecting to primary node...</div>
    </div>

    <script>
        const progress = document.getElementById('progress');
        const status = document.getElementById('status');
        
        // Start progress bar
        setTimeout(() => {
            progress.style.width = '100%';
        }, 100);

        // Status messages
        const messages = [
            "Connecting to primary node...",
            "Decrypting archive protocols...",
            "Synchronizing with sol.system42.one...",
            "Loading full interface...",
            "Welcome back, Operator."
        ];
        
        let i = 0;
        const interval = setInterval(() => {
            i++;
            if (i < messages.length) {
                status.textContent = messages[i];
            }
        }, 1100);

        // Redirect after 5 seconds
        setTimeout(() => {
            window.location.replace("https://sol.system42.one/gui");
        }, 5000);
    </script>
</body>
</html>
